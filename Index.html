<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist To-Do</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; font-weight: 400; color: #bbb; }
        input { width: 75%; padding: 12px; border: none; border-radius: 6px; background: #2a2a2a; color: white; outline: none; }
        button { width: 20%; padding: 12px; border: none; border-radius: 6px; background: #6366f1; color: white; font-weight: bold; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #2a2a2a; padding: 12px; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        li:hover { background: #333; }
        .delete-btn { color: #ff5f57; cursor: pointer; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Daily Tasks</h2>
    <div style="display: flex; justify-content: space-between;">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        let input = document.getElementById('taskInput');
        let taskList = document.getElementById('taskList');
        if (input.value.trim() === "") return;

        let li = document.createElement('li');
        li.innerHTML = `${input.value} <span class="delete-btn" onclick="this.parentElement.remove()">✕</span>`;
        
        taskList.appendChild(li);
        input.value = ""; // Clear input
    }
</script>

</body>
</html>
